version: '3'

services:
  back-end:
    build: ./back-end
    image: softy-pinko-back-end:task5
    # ports hissəsini sildik (xaricə bağlanmır)

  front-end:
    build: ./front-end
    image: softy-pinko-front-end:task5
    # ports hissəsini sildik

  proxy:
    build: ./proxy
    image: softy-pinko-proxy:task5
    ports:
      - "80:80" # Yalnız proxy xaricə açılır
    depends_on:
      - back-end
      - front-end
